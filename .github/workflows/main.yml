name: Ubuntu KVM SSHX Code-Server

on:
  workflow_dispatch:

jobs:
  ubuntu:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: System Info
        run: |
          echo "===== CPU ====="
          lscpu
          echo
          echo "===== Memory ====="
          free -h
          echo
          echo "===== Disk ====="
          df -h
          echo
          echo "===== KVM Check ====="
          if [ -e /dev/kvm ]; then
            echo "KVM Available"
          else
            echo "KVM Not Available"
          fi

      - name: Install Packages
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt update

          sudo apt install -y \
            python3.13 \
            python3.13-full \
            python3.13-venv \
            qemu-kvm \
            qemu-system-x86 \
            qemu-system \
            qemu-utils \
            ovmf \
            swtpm \
            swtpm-tools \
            cpu-checker \
            libvirt-daemon-system \
            libvirt-clients \
            bridge-utils \
            curl \
            wget \
            git \
            unzip \
            zip \
            nano \
            htop \
            tmux \
            screen

          python3.13 -m pip install \
            Flask \
            Flask-Bcrypt \
            Flask-SocketIO \
            Flask-Sock \
            requests \
            psutil \
            paramiko \
            aiohttp \
            websockets \
            colorama \
            pyyaml \
            --ignore-installed

      - name: Verify Environment
        run: |
          kvm-ok || true
          ls -la /dev/kvm || true
          swtpm --version || true
          qemu-system-x86_64 --version || true

      - name: Install code-server
        run: |
          curl -fsSL https://code-server.dev/install.sh | sh

      - name: Configure code-server
        run: |
          sudo mkdir -p /root/.config/code-server

          sudo tee /root/.config/code-server/config.yaml > /dev/null <<EOF
          bind-addr: 0.0.0.0:5009
          auth: password
          password: 1055
          cert: false
          EOF

      - name: Start code-server as root
        run: |
          sudo nohup code-server \
            --config /root/.config/code-server/config.yaml \
            --user-data-dir /root/.local/share/code-server \
            --extensions-dir /root/.local/share/code-server/extensions \
            >/tmp/code-server.log 2>&1 &

          sleep 20

          echo "===== CODE SERVER PROCESS ====="
          ps aux | grep code-server || true

          echo "===== CODE SERVER LOG ====="
          sudo cat /tmp/code-server.log || true

          echo "===== PORT CHECK ====="
          sudo ss -tulpn | grep 5009 || true

      - name: Install SSHX
        run: |
          curl -sSf https://sshx.io/get | sh

      - name: Start SSHX
        run: |
          export PATH="$HOME/.local/bin:$PATH"

          nohup sshx > sshx.log 2>&1 &
          sleep 20

          echo "===== SSHX OUTPUT ====="
          cat sshx.log || true

          echo "===== SSHX PROCESS ====="
          ps aux | grep sshx || true

      - name: Start Serveo Tunnels
        run: |
          mkdir -p ~/serveo

          nohup ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -R 80:localhost:5009 \
            serveo.net > ~/serveo/5009.log 2>&1 &

          nohup ssh -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -R 80:localhost:5002 \
            serveo.net > ~/serveo/5002.log 2>&1 &

          echo "Waiting for Serveo URLs..."
          sleep 20

          echo "===== SERVEO 5009 ====="
          cat ~/serveo/5009.log || true

          echo "===== SERVEO 5002 ====="
          cat ~/serveo/5002.log || true

          echo "===== SSH PROCESSES ====="
          ps aux | grep "[s]sh .*serveo" || true

      - name: Keep Alive
        run: |
          echo "Keeping runner alive for 6 hours..."
          sleep 21600
